<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gracewell Together Invite</title>
  <meta
    name="description"
    content="Open a Gracewell Together invite, install the app if needed, and continue with your invite code."
  />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="./css/invite.css" />
</head>
<body>
  <main class="invite-page">
    <section class="hero">
      <p class="eyebrow" data-i18n="common.together_name"></p>
      <h1 id="heroTitle" data-i18n="invite.landing.title"></h1>
      <p id="heroSubtitle" class="subtitle" data-i18n="invite.landing.subtitle"></p>
    </section>

    <section class="actions">
      <a
        id="downloadButton"
        class="button button-primary"
        href="https://apps.apple.com/us/app/gracewell/id6760741742"
        data-i18n="invite.landing.download"
      ></a>
      <button
        id="copyCodeButton"
        class="button button-secondary"
        type="button"
        data-i18n="invite.landing.copy_code"
      ></button>
      <a
        id="openAppLink"
        class="text-link"
        href="gracewell://invite/"
        data-i18n="invite.landing.open_app"
      ></a>
    </section>

    <section id="inviteCodeCard" class="card code-card">
      <p class="label" data-i18n="invite.landing.code_label"></p>
      <div id="inviteCode" class="invite-code">ABCD-1234</div>
      <p id="codeHelper" class="helper" data-i18n="invite.landing.code_helper"></p>
    </section>

    <section class="card">
      <p class="section-title" data-i18n="invite.landing.footer"></p>
      <ul class="benefit-list">
        <li data-i18n="invite.accept.benefit.prayers"></li>
        <li data-i18n="invite.accept.benefit.sessions"></li>
        <li data-i18n="invite.accept.benefit.paths"></li>
      </ul>
    </section>

    <section class="card support-card">
      <p class="section-title" data-i18n="invite.landing.already_installed_short"></p>
      <p class="helper" data-i18n="invite.invalid.helper"></p>
      <a
        class="text-link inline-link"
        href="https://richcodestudio.com/apps/gracewell/support/"
      >
        Gracewell support
      </a>
    </section>
  </main>

  <script src="./js/i18n.js"></script>
  <script src="./js/invite.js"></script>
</body>
</html>
